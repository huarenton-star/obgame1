<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>產科急症模擬</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0f1117; color: #e8eaf0; font-size: 13px; line-height: 1.5; }
#menu { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; padding: 20px; }
#game { display: none; }
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 200px; background: #161b27; border-right: 1px solid #2a3349; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.maincol { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sblock { padding: 10px 12px; border-bottom: 1px solid #2a3349; }
.slabel { font-size: 9px; font-weight: 600; color: #5a6478; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.vgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.vcard { background: #1e2535; border-radius: 8px; border: 1px solid #2a3349; padding: 7px 8px; }
.vlabel { font-size: 9px; font-weight: 600; color: #5a6478; text-transform: uppercase; }
.vval { font-size: 16px; font-weight: 700; margin-top: 1px; }
.vunit { font-size: 9px; color: #5a6478; }
.cred { color: #ef4444; }
.cgrn { color: #22c55e; }
.scorebox { background: #1e2535; border: 1px solid #2a3349; border-radius: 8px; padding: 9px 10px; }
.scorerow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.scorenum { font-size: 20px; font-weight: 700; color: #22c55e; }
.scoretrack { height: 4px; background: #252d40; border-radius: 2px; overflow: hidden; }
.scorefill { height: 100%; border-radius: 2px; background: #22c55e; }
.phasebox { background: #1e2535; border: 1px solid #2a3349; border-radius: 8px; padding: 9px 10px; }
.phasedots { display: flex; gap: 4px; margin-top: 5px; }
.pdot { width: 7px; height: 7px; border-radius: 50%; background: #3a4566; }
.pdot.done { background: #22c55e; }
.pdot.active { background: #2dd4bf; }
.donelist { display: flex; flex-direction: column; gap: 4px; }
.doneitem { background: #1e2535; border: 1px solid #2a3349; border-radius: 8px; padding: 7px 10px; cursor: pointer; font-size: 11px; text-align: left; color: #8892a4; width: 100%; }
.doneitem:hover { border-color: #2dd4bf; color: #2dd4bf; }
.topbar { padding: 9px 16px; border-bottom: 1px solid #2a3349; background: #161b27; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.topphase { font-size: 12px; font-weight: 600; color: #2dd4bf; }
.toptitle { font-size: 12px; color: #8892a4; }
.scenearea { flex: 1; overflow-y: auto; padding: 16px; }
.card { background: #161b27; border: 1px solid #2a3349; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.cardtitle { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.cardbody { font-size: 12px; color: #8892a4; line-height: 1.75; }
.alert { border-radius: 8px; padding: 9px 13px; font-size: 12px; margin-bottom: 10px; }
.alert-r { background: #2e0a0a; border: 1px solid #5a1212; color: #fca5a5; }
.alert-y { background: #2e200a; border: 1px solid #5a3a0a; color: #fcd34d; }
.alert-b { background: #0a1a2e; border: 1px solid #1a2a4a; color: #93c5fd; }
.alert-g { background: #0a2e1a; border: 1px solid #0a3a1a; color: #86efac; }
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 5px; }
.badge-y { background: #2e200a; color: #f59e0b; border: 1px solid #5a3a0a; }
.badge-r { background: #2e0a0a; color: #ef4444; border: 1px solid #5a1212; }
.badge-g { background: #0a2e1a; color: #22c55e; border: 1px solid #0a3a1a; }
.checkgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 4px; }
.checkbtn { background: #1e2535; border: 1px solid #3a4566; border-radius: 8px; padding: 9px 12px; color: #e8eaf0; font-size: 12px; font-weight: 500; cursor: pointer; text-align: left; display: flex; align-items: flex-start; gap: 7px; line-height: 1.5; width: 100%; }
.checkbtn:hover { background: #252d40; border-color: #2dd4bf; color: #2dd4bf; }
.checkbtn.used { opacity: 0.4; cursor: default; pointer-events: none; }
.rtable { width: 100%; border-collapse: collapse; }
.rtable tr { border-bottom: 1px solid #2a3349; }
.rtable tr:last-child { border-bottom: none; }
.rtable td { padding: 5px 2px; font-size: 11px; color: #8892a4; }
.rtable td:last-child { text-align: right; font-weight: 600; }
.rsec { font-size: 9px; font-weight: 600; color: #5a6478; text-transform: uppercase; padding: 6px 2px 3px; }
.hi { color: #ef4444; }
.lo { color: #f59e0b; }
.ok { color: #22c55e; }
.nm { color: #e8eaf0; }
.quizcard { background: #161b27; border: 2px solid #2dd4bf; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.quizq { font-size: 13px; font-weight: 600; color: #2dd4bf; margin-bottom: 12px; line-height: 1.6; }
.quizopts { display: flex; flex-direction: column; gap: 6px; }
.quizopt { background: #1e2535; border: 1px solid #3a4566; border-radius: 8px; padding: 9px 13px; cursor: pointer; font-size: 12px; text-align: left; color: #e8eaf0; width: 100%; }
.quizopt:hover { border-color: #60a5fa; color: #60a5fa; }
.quizopt.correct { background: #0a2e1a; border-color: #22c55e; color: #86efac; pointer-events: none; }
.quizopt.wrong { background: #2e0a0a; border-color: #ef4444; color: #fca5a5; pointer-events: none; }
.quizopt.reveal { background: #0a2e1a; border-color: #22c55e; color: #86efac; opacity: 0.7; pointer-events: none; }
.nextbtn { background: #2dd4bf; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; color: #0a2020; cursor: pointer; margin-top: 10px; display: block; }
.ghostbtn { background: #1e2535; border: 1px solid #3a4566; border-radius: 8px; padding: 8px 16px; font-size: 12px; color: #8892a4; cursor: pointer; }
.ghostbtn:hover { color: #e8eaf0; border-color: #8892a4; }
.spinner { display: inline-flex; gap: 4px; }
.spinner span { width: 5px; height: 5px; background: #2dd4bf; border-radius: 50%; animation: blink 1.2s infinite; }
.spinner span:nth-child(2) { animation-delay: 0.2s; }
.spinner span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0% { opacity: 0.2; } 40% { opacity: 1; } 80% { opacity: 0.2; } 100% { opacity: 0.2; } }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.overlaybox { background: #161b27; border: 1px solid #3a4566; border-radius: 12px; padding: 18px; width: 360px; max-height: 80vh; overflow-y: auto; }
.menubtn { background: #1e2535; border: 1px solid #3a4566; border-radius: 8px; padding: 12px 16px; color: #e8eaf0; font-size: 14px; cursor: pointer; text-align: left; width: 100%; max-width: 340px; }
.menubtn:hover { border-color: #2dd4bf; color: #2dd4bf; }
</style>
</head>
<body>

<div id="menu">
  <div style="text-align:center">
    <div style="font-size:36px;margin-bottom:8px">🏥</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">產科急症模擬遊戲</div>
    <div style="font-size:12px;color:#8892a4">OB Emergency Simulator</div>
  </div>
  <div style="width:100%;max-width:340px">
    <div style="font-size:11px;color:#5a6478;margin-bottom:8px">選擇難度</div>
    <div style="display:flex;flex-direction:column;gap:7px" id="diffbtns">
      <button class="menubtn" id="d0" onclick="selDiff(0)">🟢 醫學生</button>
      <button class="menubtn" id="d1" onclick="selDiff(1)">🟡 住院醫師</button>
      <button class="menubtn" id="d2" onclick="selDiff(2)">🔴 主治醫師</button>
    </div>
  </div>
  <div style="width:100%;max-width:340px">
    <div style="font-size:11px;color:#5a6478;margin-bottom:8px">選擇關卡</div>
    <div style="display:flex;flex-direction:column;gap:7px">
      <button class="menubtn" onclick="startGame(0)">💊 子癇前症 / HELLP</button>
      <button class="menubtn" onclick="startGame(1)">🩸 前置胎盤</button>
      <button class="menubtn" onclick="startGame(2)">🤖 AI 動態生成</button>
    </div>
  </div>
</div>

<div id="game">
<div class="app">
  <div class="sidebar">
    <div class="sblock">
      <div class="slabel">Patient</div>
      <div style="font-size:16px;font-weight:700" id="pt-name">-</div>
      <div style="font-size:11px;color:#8892a4;margin-top:2px" id="pt-sub">-</div>
      <div id="pt-badge" style="margin-top:5px"></div>
    </div>
    <div class="sblock">
      <div class="slabel">母體生命徵象</div>
      <div class="vgrid">
        <div class="vcard"><div class="vlabel">BP</div><div class="vval cred" id="v-bp">-</div><div class="vunit">mmHg</div></div>
        <div class="vcard"><div class="vlabel">HR</div><div class="vval" id="v-hr">-</div><div class="vunit">bpm</div></div>
        <div class="vcard"><div class="vlabel">RR</div><div class="vval" id="v-rr">-</div><div class="vunit">/min</div></div>
        <div class="vcard"><div class="vlabel">SpO2</div><div class="vval cgrn" id="v-spo2">-</div><div class="vunit">%</div></div>
      </div>
    </div>
    <div class="sblock">
      <div class="slabel">胎兒</div>
      <div class="vgrid">
        <div class="vcard"><div class="vlabel">FHR</div><div class="vval cgrn" id="v-fhr">-</div><div class="vunit">bpm</div></div>
        <div class="vcard"><div class="vlabel">GA</div><div class="vval" style="font-size:13px" id="v-ga">-</div><div class="vunit">週</div></div>
      </div>
    </div>
    <div class="sblock">
      <div class="slabel">臨床積分</div>
      <div class="scorebox">
        <div class="scorerow"><span style="font-size:11px;color:#8892a4">處置評分</span><span class="scorenum" id="scorenum">100</span></div>
        <div class="scoretrack"><div class="scorefill" id="scorefill" style="width:100%"></div></div>
      </div>
    </div>
    <div class="sblock">
      <div class="slabel">遊戲進度</div>
      <div class="phasebox">
        <div style="font-size:11px;color:#8892a4" id="phase-label">-</div>
        <div class="phasedots" id="phase-dots"></div>
      </div>
    </div>
    <div class="sblock" style="flex:1">
      <div class="slabel">已完成檢查</div>
      <div class="donelist" id="done-list"></div>
    </div>
    <div style="padding:10px 12px;margin-top:auto">
      <button class="ghostbtn" style="width:100%;font-size:11px" onclick="backToMenu()">← 回主選單</button>
      <div style="font-size:9px;color:#5a6478;margin-top:8px;line-height:1.6">ACOG/UpToDate 指引<br>僅供醫學教育用途</div>
    </div>
  </div>
  <div class="maincol">
    <div class="topbar">
      <div class="topphase" id="top-phase">🏥 急診</div>
      <div class="toptitle" id="top-title">-</div>
    </div>
    <div class="scenearea" id="scene"></div>
  </div>
</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="overlaybox">
    <button onclick="document.getElementById('overlay').style.display='none'" style="float:right;background:none;border:none;color:#8892a4;font-size:18px;cursor:pointer">x</button>
    <div id="overlay-content"></div>
  </div>
</div>

<script>
var score = 100;
var diffIndex = 1;
var doneChecks = {};
var quizStore = {};
var currentCase = -1;

var DIFFS = ['student', 'resident', 'attending'];

function selDiff(i) {
  diffIndex = i;
  for (var d = 0; d < 3; d++) {
    var b = document.getElementById('d' + d);
    b.style.borderColor = d === i ? '#2dd4bf' : '#3a4566';
    b.style.color = d === i ? '#2dd4bf' : '#e8eaf0';
  }
}

function setVitals(bp, hr, rr, spo2, fhr, ga) {
  document.getElementById('v-bp').textContent = bp;
  document.getElementById('v-hr').textContent = hr;
  document.getElementById('v-rr').textContent = rr;
  document.getElementById('v-spo2').textContent = spo2;
  document.getElementById('v-fhr').textContent = fhr;
  document.getElementById('v-ga').textContent = ga;
}

function setScore(delta) {
  score = score + delta;
  if (score < 0) score = 0;
  if (score > 100) score = 100;
  var col = score >= 70 ? '#22c55e' : score >= 40 ? '#f59e0b' : '#ef4444';
  document.getElementById('scorenum').textContent = score;
  document.getElementById('scorenum').style.color = col;
  document.getElementById('scorefill').style.width = score + '%';
  document.getElementById('scorefill').style.background = col;
}

function setPhase(p, label, total) {
  document.getElementById('phase-label').textContent = label;
  var phases = ['🏥 急診接案', '🔍 初步評估', '📋 檢查申請', '📊 報告判讀', '💊 治療處置', '🏁 分娩決策', '✅ 結案'];
  document.getElementById('top-phase').textContent = phases[p] || phases[0];
  var dots = document.getElementById('phase-dots');
  dots.innerHTML = '';
  for (var i = 0; i < total; i++) {
    var d = document.createElement('div');
    d.className = 'pdot' + (i < p ? ' done' : i === p ? ' active' : '');
    dots.appendChild(d);
  }
}

function addEl(el) {
  var s = document.getElementById('scene');
  s.appendChild(el);
  s.scrollTop = s.scrollHeight;
}

function makeEl(tag, cls, txt) {
  var el = document.createElement(tag);
  if (cls) el.className = cls;
  if (txt) el.textContent = txt;
  return el;
}

function makeCard(title, bodyEl) {
  var c = makeEl('div', 'card');
  c.appendChild(makeEl('div', 'cardtitle', title));
  c.appendChild(bodyEl);
  return c;
}

function makeAlert(cls, txt) {
  return makeEl('div', 'alert alert-' + cls, txt);
}

function makeTable(rows) {
  var t = makeEl('table', 'rtable');
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var tr = document.createElement('tr');
    if (r.length === 1) {
      var td = document.createElement('td');
      td.className = 'rsec';
      td.colSpan = 2;
      td.textContent = r[0];
      tr.appendChild(td);
    } else {
      var td1 = document.createElement('td');
      td1.textContent = r[0];
      var td2 = document.createElement('td');
      td2.className = r[2] || 'nm';
      td2.textContent = r[1];
      tr.appendChild(td1);
      tr.appendChild(td2);
    }
    t.appendChild(tr);
  }
  return t;
}

function nstSVG() {
  var g = '';
  for (var i = 0; i < 6; i++) {
    g += '<line x1="' + (i * 86) + '" y1="0" x2="' + (i * 86) + '" y2="85" stroke="#2a3349" stroke-width="0.5"/>';
  }
  for (var j = 0; j < 3; j++) {
    g += '<line x1="0" y1="' + (15 + j * 25) + '" x2="520" y2="' + (15 + j * 25) + '" stroke="#2a3349" stroke-width="0.5"/>';
  }
  var div = document.createElement('div');
  div.innerHTML = '<svg viewBox="0 0 520 85" style="width:100%;height:85px;display:block">'
    + '<rect width="520" height="85" fill="#252d40" rx="4"/>' + g
    + '<text x="4" y="17" font-size="8" fill="#5a6478">160</text>'
    + '<text x="4" y="42" font-size="8" fill="#5a6478">140</text>'
    + '<text x="4" y="67" font-size="8" fill="#5a6478">120</text>'
    + '<polyline fill="none" stroke="#22c55e" stroke-width="1.5" points="15,42 40,38 65,41 80,36 100,33 112,29 122,26 132,29 142,36 155,41 170,42 190,39 210,37 230,41 250,43 265,40 275,36 285,31 295,28 305,31 315,37 328,41 345,40 365,41 385,39 405,42 425,40 445,42 465,40 490,42 510,41"/>'
    + '<rect x="108" y="20" width="48" height="28" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" rx="2" opacity="0.7"/>'
    + '<rect x="268" y="20" width="52" height="28" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" rx="2" opacity="0.7"/>'
    + '<text x="109" y="58" font-size="7" fill="#22c55e">accel x1</text>'
    + '<text x="269" y="58" font-size="7" fill="#22c55e">accel x2</text>'
    + '</svg>';
  return div.firstChild;
}

function buildReportEl(id) {
  var wrap = document.createElement('div');
  if (id === 'labs') {
    wrap.appendChild(makeEl('div', 'cardtitle', '🧪 血液檢驗'));
    wrap.appendChild(makeTable([
      ['CBC'], ['Hemoglobin', '11.2 g/dL', 'ok'], ['Platelet', '88,000 /uL', 'hi'], ['WBC', '10,800 /uL', 'nm'],
      ['LFT'], ['AST', '186 U/L', 'hi'], ['ALT', '142 U/L', 'hi'], ['LDH', '520 U/L', 'hi'],
      ['腎功能'], ['Creatinine', '1.1 mg/dL', 'lo'], ['Uric Acid', '7.8 mg/dL', 'lo']
    ]));
    wrap.appendChild(makeAlert('r', 'PLT 88k + AST/LDH 升高，符合 HELLP syndrome'));
  } else if (id === 'urine') {
    wrap.appendChild(makeEl('div', 'cardtitle', '🫧 尿液蛋白'));
    wrap.appendChild(makeTable([
      ['Spot P/Cr', '1.8 mg/mg', 'hi'], ['Dipstick', '3+', 'hi'], ['尿色', '深黃色', 'lo']
    ]));
    var note = makeEl('div', '', 'P/Cr 1.8 約等於 24hr 尿蛋白 1800mg，屬重度蛋白尿');
    note.style.cssText = 'font-size:10px;color:#8892a4;margin-top:6px';
    wrap.appendChild(note);
  } else if (id === 'nst') {
    wrap.appendChild(makeEl('div', 'cardtitle', '📈 NST 胎兒監視器'));
    wrap.appendChild(nstSVG());
    wrap.appendChild(makeTable([
      ['基礎胎心率', '142 bpm', 'ok'], ['加速', '2次 15bpm x 15秒', 'ok'], ['減速', '無', 'ok'], ['NST', 'Reactive 正常', 'ok']
    ]));
    document.getElementById('v-fhr').textContent = '142';
  } else if (id === 'us') {
    wrap.appendChild(makeEl('div', 'cardtitle', '🔊 產科超音波'));
    wrap.appendChild(makeTable([
      ['胎兒'], ['EFW', '1820g (10th %ile)', 'lo'], ['胎位', '頭位', 'nm'],
      ['羊水'], ['AFI', '7.2 cm 正常值 8-24', 'lo'], ['S/D ratio', '3.1 正常值3.5以下', 'nm'], ['End-diastolic', 'Present', 'ok']
    ]));
    wrap.appendChild(makeAlert('y', 'EFW 低於10th %ile 符合 FGR，AFI 偏低，需加強監測'));
  } else if (id === 'mgso4') {
    wrap.appendChild(makeEl('div', 'cardtitle', '💊 MgSO4 硫酸鎂'));
    wrap.appendChild(makeTable([
      ['Loading', '4g IV over 20min', 'ok'], ['Maintenance', '2g/hr', 'ok']
    ]));
    wrap.appendChild(makeAlert('y', '監測：膝腱反射、尿量大於25mL/hr、呼吸大於12/min。備 Ca-gluconate 解毒'));
  } else if (id === 'antihtn') {
    wrap.appendChild(makeEl('div', 'cardtitle', '❤️ 降壓治療'));
    wrap.appendChild(makeTable([
      ['藥物', 'Labetalol 20mg IV', 'ok'], ['目標 BP', '140-155 / 90-105', 'nm']
    ]));
    wrap.appendChild(makeAlert('b', '不可降至正常值，以免胎盤灌流不足'));
  } else if (id === 'deliver') {
    wrap.appendChild(makeEl('div', 'cardtitle', '🏥 分娩計畫'));
    wrap.appendChild(makeTable([
      ['GA', '34+2 週', 'nm'], ['適應症', '重度子癇前症 HELLP', 'hi'], ['促肺成熟', 'Betamethasone 12mg IM x2', 'ok']
    ]));
    wrap.appendChild(makeAlert('g', '34週合併重症，終止妊娠為根本治療'));
  } else if (id === 'iv') {
    wrap.appendChild(makeEl('div', 'cardtitle', '💉 靜脈通路'));
    wrap.appendChild(makeTable([
      ['CBC'], ['Hemoglobin', '9.2 g/dL', 'lo'], ['Platelet', '185,000 /uL', 'nm'],
      ['凝血'], ['PT/INR', '正常', 'ok'], ['aPTT', '正常', 'ok'], ['Blood Type', 'O+', 'nm']
    ]));
    wrap.appendChild(makeAlert('y', 'Hb 9.2 輕度貧血，已建立兩條大口徑靜脈通路'));
  } else if (id === 'usp') {
    wrap.appendChild(makeEl('div', 'cardtitle', '🔊 產科超音波'));
    wrap.appendChild(makeTable([
      ['胎盤'], ['胎盤位置', '完全性前置胎盤', 'hi'], ['子宮頸內口', '完全覆蓋', 'hi'],
      ['胎兒'], ['BPP', '8/8 正常', 'ok'], ['胎位', '頭位', 'nm'], ['EFW', '約 2100g', 'nm']
    ]));
    wrap.appendChild(makeAlert('r', '完全性前置胎盤確認，絕對禁止內診'));
  } else if (id === 'nstp') {
    wrap.appendChild(makeEl('div', 'cardtitle', '📈 NST 胎兒監視器'));
    wrap.appendChild(nstSVG());
    wrap.appendChild(makeTable([

function addDoneItem(id, icon, label, reportEl) {
  doneChecks[id] = { icon: icon, label: label, el: reportEl };
  var dl = document.getElementById('done-list');
  dl.innerHTML = '';
  var keys = Object.keys(doneChecks);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var item = doneChecks[k];
    var btn = makeEl('button', 'doneitem', item.icon + ' ' + item.label);
    btn.setAttribute('data-id', k);
    btn.onclick = function() {
      var kid = this.getAttribute('data-id');
      var oc = document.getElementById('overlay-content');
      oc.innerHTML = '';
      var hd = makeEl('div', '', doneChecks[kid].label);
      hd.style.cssText = 'font-size:13px;font-weight:700;margin-bottom:12px;padding-right:24px';
      oc.appendChild(hd);
      oc.appendChild(doneChecks[kid].el.cloneNode(true));
      document.getElementById('overlay').style.display = 'flex';
    };
    dl.appendChild(btn);
  }
}

function getChecks() {
  if (currentCase === 0) return CHECKS_PE;
  if (currentCase === 1) return CHECKS_PP;
  return [];
}

function renderQuiz(chk) {
  quizStore[chk.id] = chk;
  var wrap = makeEl('div', 'quizcard');
  wrap.id = 'quiz-' + chk.id;
  wrap.appendChild(makeEl('div', 'quizq', '🧠 判讀問題：' + chk.q));
  var opts = makeEl('div', 'quizopts');
  for (var i = 0; i < chk.opts.length; i++) {
    var b = makeEl('button', 'quizopt', String.fromCharCode(65 + i) + '. ' + chk.opts[i]);
    b.setAttribute('data-i', i);
    b.setAttribute('data-cid', chk.id);
    b.onclick = function() {
      doAnswer(this.getAttribute('data-cid'), parseInt(this.getAttribute('data-i')));
    };
    opts.appendChild(b);
  }
  wrap.appendChild(opts);
  addEl(wrap);
}

function doAnswer(cid, chosen) {
  var chk = quizStore[cid];
  if (!chk) return;
  var wrap = document.getElementById('quiz-' + cid);
  if (!wrap) return;
  var btns = wrap.querySelectorAll('.quizopt');
  for (var i = 0; i < btns.length; i++) {
    if (i === chk.cor) {
      btns[i].className = 'quizopt ' + (i === chosen ? 'correct' : 'reveal');
    } else if (i === chosen) {
      btns[i].className = 'quizopt wrong';
    } else {
      btns[i].style.pointerEvents = 'none';
    }
  }
  setScore(chosen === chk.cor ? 15 : -10);
  var fb = makeEl('div', 'alert alert-' + (chosen === chk.cor ? 'g' : 'r'), (chosen === chk.cor ? '✅ ' : '❌ ') + chk.exp);
  fb.style.marginTop = '10px';
  wrap.appendChild(fb);
  var nb = makeEl('button', 'nextbtn', '繼續 →');
  nb.onclick = showCheckMenu;
  wrap.appendChild(nb);
  document.getElementById('scene').scrollTop = 99999;
}

function doCheck(idx) {
  var checks = getChecks();
  var chk = checks[idx];
  if (!chk || doneChecks[chk.id]) return;
  var note = makeEl('div', '', '申請中：' + chk.label + '...');
  note.style.cssText = 'color:#5a6478;font-size:12px;padding:8px 0';
  addEl(note);
  var savedIdx = idx;
  setTimeout(function() {
    var rEl = buildReportEl(checks[savedIdx].id);
    addDoneItem(checks[savedIdx].id, checks[savedIdx].icon, checks[savedIdx].label, rEl);
    var card = makeEl('div', 'card');
    card.appendChild(rEl.cloneNode(true));
    addEl(card);
    renderQuiz(checks[savedIdx]);
  }, 500);
}

function showCheckMenu() {
  var checks = getChecks();
  var remaining = 0;
  for (var i = 0; i < checks.length; i++) {
    if (!doneChecks[checks[i].id]) remaining++;
  }
  if (remaining === 0) {
    addEl(makeAlert('g', '所有關鍵檢查已完成！'));
    showFinal();
    return;
  }
  var wrap = makeEl('div', 'card');
  wrap.appendChild(makeEl('div', 'cardtitle', '選擇下一步檢查或處置'));
  var grid = makeEl('div', 'checkgrid');
  for (var i = 0; i < checks.length; i++) {
    var ch = checks[i];
    var used = !!doneChecks[ch.id];
    var b = makeEl('button', 'checkbtn' + (used ? ' used' : ''));
    var ic = makeEl('span', '', ch.icon);
    var tx = document.createElement('span');
    var lb = makeEl('span', '', (used ? '✓ ' : '') + ch.label);
    var ds = makeEl('small', '', ch.desc);
    ds.style.cssText = 'color:#5a6478;font-weight:400;display:block';
    tx.appendChild(lb);
    tx.appendChild(ds);
    b.appendChild(ic);
    b.appendChild(tx);
    if (!used) {
      b.setAttribute('data-i', i);
      b.onclick = function() { doCheck(parseInt(this.getAttribute('data-i'))); };
    }
    grid.appendChild(b);
  }
  wrap.appendChild(grid);
  addEl(wrap);
  document.getElementById('scene').scrollTop = 99999;
}

function showFinal() {
  var diag = currentCase === 0 ? '重度子癇前症 + HELLP' : '完全性前置胎盤';
  var col = score >= 70 ? '#22c55e' : score >= 40 ? '#f59e0b' : '#ef4444';
  var wrap = makeEl('div', 'card');
  wrap.style.borderColor = '#2dd4bf';
  var t = makeEl('div', 'cardtitle', '🏁 案例結束');
  t.style.color = '#2dd4bf';
  wrap.appendChild(t);
  var b = makeEl('div', 'cardbody', '最終診斷：' + diag);
  wrap.appendChild(b);
  addEl(wrap);
  var sc = makeEl('div', 'scorebox');
  sc.style.padding = '14px';
  sc.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:#e8eaf0">最終得分</div>'
    + '<div style="font-size:32px;font-weight:700;color:' + col + '">' + score + ' / 100</div>';
  addEl(sc);
  var nb = makeEl('button', 'nextbtn', '← 回主選單');
  nb.style.marginTop = '8px';
  nb.onclick = backToMenu;
  addEl(nb);
}

function startGame(caseNum) {
  currentCase = caseNum;
  score = 100;
  doneChecks = {};
  quizStore = {};
  setScore(0);
  document.getElementById('done-list').innerHTML = '';
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('scene').innerHTML = '';
  if (caseNum === 2) { startAI(); return; }
  if (caseNum === 0) {
    document.getElementById('pt-name').textContent = '陳韋玲';
    document.getElementById('pt-sub').textContent = 'G2P1 / 28歲';
    document.getElementById('pt-badge').innerHTML = '<span class="badge badge-y">待評估</span>';
    document.getElementById('top-title').textContent = '重度子癇前症 + HELLP';
    setVitals('168/112', '96', '18', '98', '-', '34+2');
    setPhase(0, '主訴接收', 7);
    var sc = document.createElement('div');
    var ch = makeEl('div', 'card');
    ch.appendChild(makeEl('div', 'cardtitle', '急診室 14:32'));
    var cb = makeEl('div', 'cardbody', '一位懷孕婦女由家屬攙扶走入急診，分診血壓 168/112 mmHg 已二次確認。家屬告知患者頭痛劇烈、視覺模糊、上腹部疼痛。病患意識清醒，面色微蒼。');
    ch.appendChild(cb);
    sc.appendChild(ch);
    sc.appendChild(makeAlert('r', 'BP 168/112 mmHg x2，需立即評估！'));
    document.getElementById('scene').appendChild(sc);
  } else {
    document.getElementById('pt-name').textContent = '林小萍';
    document.getElementById('pt-sub').textContent = 'G2P1 / 29歲';
    document.getElementById('pt-badge').innerHTML = '<span class="badge badge-y">待評估</span>';
    document.getElementById('top-title').textContent = '前置胎盤';
    setVitals('110/70', '98', '18', '98', '-', '34');
    setPhase(0, '主訴接收', 6);
    var sc = document.createElement('div');
    var ch = makeEl('div', 'card');
    ch.appendChild(makeEl('div', 'cardtitle', '急診室 09:15'));
    var cb = makeEl('div', 'cardbody', '29歲孕婦，孕34週，由丈夫陪同走入急診。主訴無痛性陰道大量出血，約浸濕一片衛生棉，無腹痛。病患神情緊張，意識清醒。');
    ch.appendChild(cb);
    sc.appendChild(ch);
    sc.appendChild(makeAlert('y', '孕晚期出血，未確認胎盤位置前請勿內診'));
    document.getElementById('scene').appendChild(sc);
  }
  setTimeout(function() { setPhase(1, '初步評估'); showCheckMenu(); }, 800);
}

function startAI() {
  document.getElementById('pt-name').textContent = '載入中...';
  var sc = makeEl('div', '');
  var sp = makeEl('div', '', '');
  sp.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:20px;color:#5a6478;font-size:12px"><div class="spinner"><span></span><span></span><span></span></div> AI 正在生成案例...</div>';
  document.getElementById('scene').appendChild(sp);
  var prompt = 'Generate an OB emergency case in Traditional Chinese. Output JSON only, no markdown. Format: {"ptName":"name","ga":"34+2","g":2,"p":1,"age":28,"vitals":{"bp":"168/110","hr":"95","rr":"18","spo2":"98"},"diagnosis":"diagnosis","chief":"2 sentence description","checks":[{"id":"c1","icon":"emoji","label":"check name","desc":"brief desc","reportRows":[["section"],["item","value","ok"]],"alertCls":"y","alertTxt":"alert text","q":"question","opts":["A","B","C","D"],"cor":0,"exp":"explanation"}]} Category: random from abruption/cord prolapse/AFE/PPROM/ectopic/shoulder dystocia/PPH/uterine rupture. Difficulty: ' + DIFFS[diffIndex];
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1500, messages: [{ role: 'user', content: prompt }] })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var txt = data.content.map(function(c) { return c.text || ''; }).join('');
    var j = JSON.parse(txt.replace(/```json|```/g, '').trim());
    document.getElementById('pt-name').textContent = j.ptName;
    document.getElementById('pt-sub').textContent = 'G' + j.g + 'P' + j.p + ' / ' + j.age + '歲';
    document.getElementById('pt-badge').innerHTML = '<span class="badge badge-y">待評估</span>';
    document.getElementById('top-title').textContent = j.diagnosis;
    setVitals(j.vitals.bp, j.vitals.hr, j.vitals.rr, j.vitals.spo2, '-', j.ga);
    setPhase(0, '主訴接收', 6);
    document.getElementById('scene').innerHTML = '';
    var sc = document.createElement('div');
    var ch = makeEl('div', 'card');
    ch.appendChild(makeEl('div', 'cardtitle', '案例'));
    ch.appendChild(makeEl('div', 'cardbody', j.chief));
    sc.appendChild(ch);
    document.getElementById('scene').appendChild(sc);
    var aiChecks = (j.checks || []).map(function(ch) {
      return { id: ch.id, icon: ch.icon || '🔍', label: ch.label, desc: ch.desc || '',
        q: ch.q || '你的判斷？', opts: ch.opts || ['A', 'B', 'C', 'D'], cor: ch.cor || 0, exp: ch.exp || '正確。',
        rows: ch.reportRows || [], alertCls: ch.alertCls || 'y', alertTxt: ch.alertTxt || '' };
    });
    CHECKS_AI = aiChecks;
    currentCase = 99;
    setTimeout(function() { setPhase(1, '初步評估'); showCheckMenu(); }, 400);
  })
  .catch(function(e) {
    document.getElementById('scene').innerHTML = '<div class="alert alert-r">AI生成失敗：' + e.message + '</div>';
  });
}

var CHECKS_AI = [];

function getChecks() {
  if (currentCase === 0) return CHECKS_PE;
  if (currentCase === 1) return CHECKS_PP;
  if (currentCase === 99) return CHECKS_AI;
  return [];
}

function backToMenu() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
  doneChecks = {};
  quizStore = {};
  currentCase = -1;
}
